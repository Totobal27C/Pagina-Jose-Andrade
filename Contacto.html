<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="css/style_form.css">
</head>

<body>
    <form id="registroForm">
        <h3> Contacto </h3>
        <input type="text" id="nombre" name="nombre" placeholder="Nombre de Usuario">
        <input type="email" id="email" name="email" placeholder="Correo electronico">
        <label for="mensaje" style="display:none">Mensaje</label>
        <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí..." rows="8" style="min-height:200px; resize:vertical; width:100%; padding:10px; border-radius:8px; border:1px solid #dfeaf6; box-sizing:border-box;"></textarea>
        <button type="submit">Enviar mensaje</button>
        <p id="status"></p>
    </form>

</body>

</html>
